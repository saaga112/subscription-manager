<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- decorative blobs -->
  <circle cx="1040" cy="80" r="220" fill="#22d3ee" opacity="0.12"/>
  <circle cx="120" cy="560" r="180" fill="#a855f7" opacity="0.15"/>

  <!-- bell icon -->
  <g transform="translate(90,90)">
    <circle cx="60" cy="60" r="60" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.15"/>
    <path d="M60 30c-11 0-20 9-20 20v10c0 8-3 15-8 21h56c-5-6-8-13-8-21V50c0-11-9-20-20-20z"
          fill="none" stroke="#facc15" stroke-width="4" stroke-linejoin="round"/>
    <path d="M52 88a8 8 0 0016 0" fill="none" stroke="#facc15" stroke-width="4" stroke-linecap="round"/>
  </g>

  <text x="90" y="280" font-family="Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#ffffff">
    Subscription Manager
  </text>
  <text x="90" y="330" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#cbd5e1">
    Self-hosted tracker for your recurring subscriptions
  </text>

  <!-- feature pills -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#e2e8f0">
    <g transform="translate(90,400)">
      <rect width="270" height="56" rx="28" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.15"/>
      <text x="28" y="36">📬 Scans Gmail receipts</text>
    </g>
    <g transform="translate(380,400)">
      <rect width="290" height="56" rx="28" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.15"/>
      <text x="28" y="36">🔔 Renewal reminders</text>
    </g>
    <g transform="translate(690,400)">
      <rect width="260" height="56" rx="28" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.15"/>
      <text x="28" y="36">📱 Installable PWA</text>
    </g>
    <g transform="translate(90,470)">
      <rect width="300" height="56" rx="28" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.15"/>
      <text x="28" y="36">🤖 Optional LLM parsing</text>
    </g>
    <g transform="translate(410,470)">
      <rect width="280" height="56" rx="28" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.15"/>
      <text x="28" y="36">🔒 Self-hosted &amp; private</text>
    </g>
  </g>

  <text x="90" y="590" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#94a3b8">
    Next.js · Prisma · SQLite · Gmail API · Web Push
  </text>
</svg>
